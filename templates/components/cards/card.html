{# Composant réutilisable - voir design-system #}
<div class="bg-white border border-slate-200 rounded-[28px] shadow-sm overflow-hidden">

  {% if title %}
    <div class="px-6 py-5 flex items-center justify-between border-b border-slate-100">
      <div class="flex items-center gap-3">
        {% if icon %}
          <div class="w-11 h-11 rounded-2xl bg-indigo-50 flex items-center justify-center">
            <i data-lucide="{{ icon }}" class="w-6 h-6 text-indigo-600"></i>
          </div>
        {% endif %}
        <div>
          <h3 class="text-xl font-extrabold text-slate-900">{{ title }}</h3>
          {% if subtitle %}
            <p class="text-sm text-slate-500 mt-0.5">{{ subtitle }}</p>
          {% endif %}
        </div>
      </div>

      {% block card_actions %}{% endblock %}
    </div>
  {% endif %}

  <div class="p-6">
    {% block card_body %}{% endblock %}
  </div>

  {% block card_footer %}{% endblock %}
</div>
