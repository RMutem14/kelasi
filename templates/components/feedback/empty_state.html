{# Composant réutilisable - voir design-system #}
<div class="flex flex-col items-center justify-center text-center py-12 px-6">
  <div class="w-20 h-20 rounded-3xl bg-slate-50 border border-slate-100 flex items-center justify-center mb-5">
    <i data-lucide="{{ icon|default:'inbox' }}" class="w-9 h-9 text-slate-400"></i>
  </div>
  <h3 class="text-lg font-bold text-slate-900 mb-1.5">{{ title|default:'Aucun élément' }}</h3>
  {% if message %}
    <p class="text-sm text-slate-500 max-w-md">{{ message }}</p>
  {% endif %}
  {% if action_label and action_url %}
    <a href="{{ action_url }}"
       class="mt-6 bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold text-sm hover:bg-indigo-700 shadow-indigo-glow flex items-center gap-2 transition-colors">
      <i data-lucide="plus" class="w-4 h-4"></i>
      {{ action_label }}
    </a>
  {% endif %}
</div>
