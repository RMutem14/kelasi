{# Composant réutilisable - voir design-system #}
<label class="flex items-start gap-3 cursor-pointer group">
  <div class="relative flex items-center h-5 mt-0.5">
    <input
      type="checkbox"
      name="{{ name }}"
      value="{{ value|default:'on' }}"
      {% if checked %}checked{% endif %}
      {% if required %}required{% endif %}
      class="peer sr-only"
    >
    <span class="w-5 h-5 rounded-md border-2 border-slate-300 bg-white peer-checked:bg-indigo-600 peer-checked:border-indigo-600 transition-colors flex items-center justify-center">
      <i data-lucide="check" class="w-3 h-3 text-white hidden peer-checked:block"></i>
    </span>
  </div>
  <div>
    <span class="text-sm font-medium text-slate-700 group-hover:text-slate-900">
      {{ label }}
      {% if required %}<span class="text-red-500">*</span>{% endif %}
    </span>
    {% if help_text %}
      <p class="mt-0.5 text-xs text-slate-500">{{ help_text }}</p>
    {% endif %}
  </div>
</label>
