{# Composant réutilisable - voir design-system #}
<div>
  {% if label %}
    <label for="{{ id|default:name }}" class="block text-sm font-semibold text-slate-700 mb-2">
      {{ label }}
      {% if required %}<span class="text-red-500">*</span>{% endif %}
    </label>
  {% endif %}

  <div class="relative">
    {% if icon %}
      <i data-lucide="{{ icon }}" class="w-5 h-5 text-slate-400 absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none"></i>
    {% endif %}

    <input
      type="{{ type|default:'text' }}"
      name="{{ name }}"
      id="{{ id|default:name }}"
      value="{{ value|default:'' }}"
      placeholder="{{ placeholder|default:'' }}"
      {% if required %}required{% endif %}
      class="w-full h-12 {% if icon %}pl-12{% else %}pl-4{% endif %} pr-4 rounded-2xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 outline-none transition-all text-slate-900 placeholder:text-slate-400"
    >
  </div>

  {% if help_text %}
    <p class="mt-1.5 text-xs text-slate-500">{{ help_text }}</p>
  {% endif %}

  {% if errors %}
    {% for error in errors %}
      <p class="mt-1.5 text-xs text-red-600 flex items-center gap-1">
        <i data-lucide="alert-circle" class="w-3.5 h-3.5"></i>
        {{ error }}
      </p>
    {% endfor %}
  {% endif %}
</div>
