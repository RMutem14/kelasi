{# Composant réutilisable - voir design-system #}
<div>
  {% if label %}
    <p class="block text-sm font-semibold text-slate-700 mb-2">
      {{ label }}
      {% if required %}<span class="text-red-500">*</span>{% endif %}
    </p>
  {% endif %}

  <div class="{% if inline|default:True %}flex flex-wrap gap-5{% else %}space-y-2{% endif %}">
    {% for opt in options %}
      <label class="flex items-center gap-2 cursor-pointer group">
        <div class="relative flex items-center h-5">
          <input
            type="radio"
            name="{{ name }}"
            value="{{ opt.value }}"
            {% if opt.checked or opt.value == selected %}checked{% endif %}
            {% if required %}required{% endif %}
            class="peer sr-only"
          >
          <span class="w-5 h-5 rounded-full border-2 border-slate-300 bg-white peer-checked:border-indigo-600 transition-colors flex items-center justify-center">
            <span class="w-2.5 h-2.5 rounded-full bg-indigo-600 hidden peer-checked:block"></span>
          </span>
        </div>
        <span class="text-sm font-medium text-slate-700 group-hover:text-slate-900">
          {{ opt.label }}
        </span>
      </label>
    {% endfor %}
  </div>

  {% if help_text %}
    <p class="mt-1.5 text-xs text-slate-500">{{ help_text }}</p>
  {% endif %}
</div>
