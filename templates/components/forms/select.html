{# Composant réutilisable - voir design-system #}
<div>
  {% if label %}
    <label for="{{ id|default:name }}" class="block text-sm font-semibold text-slate-700 mb-2">
      {{ label }}
      {% if required %}<span class="text-red-500">*</span>{% endif %}
    </label>
  {% endif %}

  <div class="relative">
    {% if icon %}
      <i data-lucide="{{ icon }}" class="w-5 h-5 text-slate-400 absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none"></i>
    {% endif %}

    <select
      name="{{ name }}"
      id="{{ id|default:name }}"
      {% if required %}required{% endif %}
      class="w-full h-12 {% if icon %}pl-12{% else %}pl-4{% endif %} pr-10 rounded-2xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 outline-none transition-all text-slate-900 appearance-none cursor-pointer"
    >
      {% if placeholder %}
        <option value="">{{ placeholder }}</option>
      {% endif %}
      {% if options %}
        {% for opt in options %}
          <option value="{{ opt.value }}" {% if opt.selected or opt.value == selected %}selected{% endif %}>{{ opt.label }}</option>
        {% endfor %}
      {% elif choices %}
        {% for value, label in choices %}
          <option value="{{ value }}" {% if value == selected %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      {% endif %}
    </select>

    <i data-lucide="chevron-down" class="w-5 h-5 text-slate-400 absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none"></i>
  </div>

  {% if help_text %}
    <p class="mt-1.5 text-xs text-slate-500">{{ help_text }}</p>
  {% endif %}

  {% if errors %}
    {% for error in errors %}
      <p class="mt-1.5 text-xs text-red-600 flex items-center gap-1">
        <i data-lucide="alert-circle" class="w-3.5 h-3.5"></i>
        {{ error }}
      </p>
    {% endfor %}
  {% endif %}
</div>
