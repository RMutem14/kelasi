{# Composant réutilisable - voir design-system #}
<div
  x-data="{ open: false }"
  @open-modal.window="if ($event.detail.id === '{{ modal_id|default:'modal' }}') open = true"
  @close-modal.window="open = false"
  @keydown.escape.window="open = false"
>
  <div
    x-show="open"
    x-cloak
    class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/50 backdrop-blur-sm px-4"
    style="display: none;"
  >
    <div
      @click.outside="open = false"
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="opacity-0 scale-95 translate-y-4"
      x-transition:enter-end="opacity-100 scale-100 translate-y-0"
      x-transition:leave="transition ease-in duration-150"
      x-transition:leave-start="opacity-100 scale-100 translate-y-0"
      x-transition:leave-end="opacity-0 scale-95 translate-y-4"
      class="w-full max-w-2xl bg-white rounded-[28px] shadow-2xl border border-slate-200 overflow-hidden max-h-[90vh] flex flex-col"
    >
      {# Header #}
      <div class="flex items-center justify-between px-7 py-6 border-b border-slate-200 flex-shrink-0">
        <div class="flex items-center gap-3">
          {% if icon %}
            <div class="w-11 h-11 rounded-2xl bg-indigo-50 flex items-center justify-center">
              <i data-lucide="{{ icon }}" class="w-5 h-5 text-indigo-600"></i>
            </div>
          {% endif %}
          <div>
            {% if subtitle %}
              <p class="text-sm font-semibold text-indigo-600 mb-0.5">{{ subtitle }}</p>
            {% endif %}
            <h2 class="text-2xl font-extrabold tracking-[-0.03em] text-slate-950">
              {{ title|default:'Modal' }}
            </h2>
          </div>
        </div>
        <button
          @click="open = false"
          class="w-10 h-10 rounded-2xl bg-slate-100 hover:bg-slate-200 flex items-center justify-center"
          aria-label="Fermer"
        >
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>

      {# Body #}
      <div class="p-7 overflow-y-auto flex-1">
        {% block modal_body %}{% endblock %}
      </div>

      {# Footer #}
      {% if modal_footer %}
        <div class="flex items-center justify-end gap-3 px-7 py-5 bg-slate-50 border-t border-slate-200 flex-shrink-0">
          {% block modal_footer %}{% endblock %}
        </div>
      {% endif %}
    </div>
  </div>
</div>
