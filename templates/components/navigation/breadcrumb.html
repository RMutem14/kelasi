{# Composant réutilisable - voir design-system #}
<nav class="flex items-center gap-2 text-sm" aria-label="Fil d'ariane">
  {% for item in items %}
    {% if not forloop.last %}
      <a href="{{ item.url|default:'#' }}" class="text-slate-500 hover:text-indigo-600 transition-colors">
        {{ item.label }}
      </a>
      <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
    {% else %}
      <span class="font-semibold text-slate-900">{{ item.label }}</span>
    {% endif %}
  {% endfor %}
</nav>
