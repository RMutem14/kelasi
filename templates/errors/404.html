{% extends "layouts/base.html" %}

{% block title %}404 — Page introuvable | {{ HUDUMA_NAME }}|Kelasi{% endblock %}

{% block body %}
  <div class="min-h-screen flex items-center justify-center bg-kelasi-bg px-4">
    <div class="text-center max-w-md">
      <div class="w-24 h-24 mx-auto rounded-3xl bg-sky-50 border border-sky-100 flex items-center justify-center mb-8">
        <i data-lucide="compass" class="w-12 h-12 text-sky-600"></i>
      </div>
      <p class="text-7xl font-extrabold tracking-[-0.04em] text-sky-600">404</p>
      <h1 class="mt-4 text-2xl font-extrabold text-slate-900">Page introuvable</h1>
      <p class="mt-3 text-sm text-slate-500">
        La page que vous cherchez n'existe pas ou a été déplacée.
        Vérifiez l'URL ou retournez au tableau de bord.
      </p>
      <div class="mt-8 flex items-center justify-center gap-3">
        <a href="{% url 'dashboard:home' %}"
           class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold text-sm hover:bg-indigo-700 shadow-indigo-glow flex items-center gap-2 transition-colors">
          <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
          Tableau de bord
        </a>
        <button onclick="history.back()"
                class="border border-slate-200 text-slate-700 px-6 py-3 rounded-2xl font-bold text-sm hover:bg-slate-50 flex items-center gap-2">
          <i data-lucide="arrow-left" class="w-4 h-4"></i>
          Retour
        </button>
      </div>
    </div>
  </div>
{% endblock %}
