<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hors ligne — Huduma</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', system-ui, sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center">
  <div class="max-w-md mx-auto text-center px-6">
    <div class="w-24 h-24 mx-auto mb-6 rounded-3xl bg-amber-100 flex items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 3a3 3 0 00-3-3M3 3a3 3 0 013-3m0 0h.01M12 12h.01M18 18h.01" />
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-slate-900 mb-3">Vous êtes hors ligne</h1>
    <p class="text-slate-600 mb-6">
      La connexion internet est indisponible. Certaines pages mises en cache restent accessibles.
      Vos actions seront synchronisées dès le retour de la connexion.
    </p>
    <button onclick="window.location.reload()"
            class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold text-sm hover:bg-indigo-700 transition-colors">
      Réessayer
    </button>
  </div>
</body>
</html>
