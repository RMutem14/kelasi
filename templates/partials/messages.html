{# Messages flash Django - design Kelasi #}
{% for message in messages %}
  <div
    class="rounded-2xl px-5 py-4 mb-3 text-sm border flex items-center gap-3"
    x-data="{ show: true }"
    x-show="show"
    x-init="setTimeout(() => show = false, 6000)"
    x-transition
  >
    {% if message.tags == 'success' %}
      <i data-lucide="check-circle" class="w-5 h-5 text-emerald-600 flex-shrink-0"></i>
      <div class="bg-emerald-50 border-emerald-200 text-emerald-800 rounded-2xl -mx-5 -my-4 px-5 py-4 w-full">
        <p class="font-semibold">{{ message }}</p>
      </div>
    {% elif message.tags == 'warning' %}
      <i data-lucide="alert-triangle" class="w-5 h-5 text-amber-600 flex-shrink-0"></i>
      <div class="bg-amber-50 border-amber-200 text-amber-800 rounded-2xl -mx-5 -my-4 px-5 py-4 w-full">
        <p class="font-semibold">{{ message }}</p>
      </div>
    {% elif message.tags == 'error' %}
      <i data-lucide="x-circle" class="w-5 h-5 text-red-600 flex-shrink-0"></i>
      <div class="bg-red-50 border-red-200 text-red-800 rounded-2xl -mx-5 -my-4 px-5 py-4 w-full">
        <p class="font-semibold">{{ message }}</p>
      </div>
    {% else %}
      <i data-lucide="info" class="w-5 h-5 text-sky-600 flex-shrink-0"></i>
      <div class="bg-sky-50 border-sky-200 text-sky-800 rounded-2xl -mx-5 -my-4 px-5 py-4 w-full">
        <p class="font-semibold">{{ message }}</p>
      </div>
    {% endif %}
  </div>
{% endfor %}
